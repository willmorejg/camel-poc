- rest:
    post:
      - path: /ingest/upload
        consumes: application/json
        produces: application/json
        description: "Accept a JSON payload and write it to S3"
        param:
          - name: body
            type: body
            description: "JSON payload to persist"
            required: true
            dataType: string
        responseMessage:
          - code: "200"
            message: "Payload written successfully"
          - code: "500"
            message: "File write failed"
        to: direct:writeToFile

- route:
    id: rest-to-file
    from:
      uri: direct:writeToFile
      steps:
        - log:
            message: "Received payload: ${body}"
        - setHeader:
            name: CamelFileName
            simple: "payload-${date:now:yyyyMMdd-HHmmssSSS}.json"
        - doTry:
            steps:
              - setProperty:
                  name: writeSuccess
                  constant: "false"
              - setHeader:
                  name: CamelAwsS3Key
                  expression:
                    simple: "{{camel.variables.jsonToProcessPath}}/${header.CamelFileName}"
              - multicast:
                  parallelProcessing: true
                  steps:
                    - to: "aws2-s3://{{camel.variables.s3BucketName}}"
              - setProperty:
                  name: writeSuccess
                  constant: "true"
            doCatch:
              - exception:
                  - java.lang.Exception
                steps:
                  - setProperty:
                      name: writeSuccess
                      constant: "false"
                  - log:
                      loggingLevel: ERROR
                      message: "S3 write failed: ${exception.message} - key ${header.CamelAwsS3Key}"
                  - setProperty:
                      name: exceptionMessage
                      simple: "${exception.message}"
        - setHeader:
            name: Content-Type
            constant: application/json
        - setBody:
            simple: '{"success": ${exchangeProperty.writeSuccess}, "filename": "${header.CamelFileName}", "error": "${exchangeProperty.exceptionMessage}"}'
        - choice:
            when:
              - simple: "${exchangeProperty.writeSuccess} == 'true'"
                steps:
                  - setHeader:
                      name: CamelHttpResponseCode
                      constant: 200
            otherwise:
              steps:
                - setHeader:
                    name: CamelHttpResponseCode
                    constant: 500
