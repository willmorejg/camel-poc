<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Address Records</title>
    <style>
        body {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 12pt;
            color: #222;
            margin: 40px;
        }

        h1 {
            font-size: 18pt;
            border-bottom: 1px solid #555;
            padding-bottom: 6px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 14pt;
            color: #333;
            margin-top: 32px;
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
        }

        table {
            border-collapse: collapse;
        }

        td {
            padding: 6px 10px;
            vertical-align: top;
        }

        td.label {
            font-weight: bold;
            width: 130px;
            color: #444;
        }

        td.value {
            color: #111;
        }

        tr:nth-child(even) {
            background-color: #f5f5f5;
        }

        .full-address {
            margin-top: 16px;
            padding: 12px 16px;
            border-left: 4px solid #555;
            background-color: #fafafa;
            font-size: 11pt;
            color: #333;
        }

        .record-block {
            margin-bottom: 40px;
        }

        .record-layout {
            display: table;
            width: 100%;
        }

        .record-data {
            display: table-cell;
            vertical-align: top;
            width: auto;
        }

        .record-map {
            display: table-cell;
            vertical-align: top;
            padding-left: 20px;
            width: 200px;
        }

        .record-map img {
            width: 200px;
            height: 200px;
            border: 1px solid #ccc;
            display: block;
        }

        .map-container {
            position: relative;
            display: inline-block;
            width: 200px;
            height: 200px;
        }

        .map-pin {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #cc0000;
            border: 2px solid #ffffff;
            border-radius: 50%;
            margin-left: -8px;
            margin-top: -8px;
        }

        .map-attribution {
            font-size: 7pt;
            color: #888;
            text-align: right;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <h1>Address Records</h1>

    <div class="record-block" th:each="record, iter : ${body}">

        <h2 th:text="${record.name}">Record</h2>

        <div class="record-layout">
            <div class="record-data">
                <table>
                    <thead>
                        <tr>
                            <th class="label">Field</th>
                            <th class="value">Value</th>
                        </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td class="label">Name</td>
                        <td class="value" th:text="${record.name}"></td>
                    </tr>
                    <tr>
                        <td class="label">Address 1</td>
                        <td class="value" th:text="${record.address1}"></td>
                    </tr>
                    <tr>
                        <td class="label">Address 2</td>
                        <td class="value" th:text="${record.address2 != null and !record.address2.isBlank()} ? ${record.address2} : ''"></td>
                    </tr>
                    <tr>
                        <td class="label">City</td>
                        <td class="value" th:text="${record.city}"></td>
                    </tr>
                    <tr>
                        <td class="label">State</td>
                        <td class="value" th:text="${record.state}"></td>
                    </tr>
                    <tr>
                        <td class="label">ZIP</td>
                        <td class="value"
                            th:text="${record.zip4 != null and !record.zip4.isBlank()} ? ${record.zip + '-' + record.zip4} : ${record.zip}"></td>
                    </tr>
                    </tbody>
                </table>

                <div class="full-address">
                    <strong>Mailing Address:</strong><br/>
                    <span th:text="${record.fullAddress}"></span>
                </div>
            </div>

            <div class="record-map">
                <div class="map-container">
                    <img th:src="${record.tileUrl}"
                         alt="Map" width="200" height="200"/>
                    <div class="map-pin"
                         th:style="'left:' + ${record.pinOffsetX} + '%;top:' + ${record.pinOffsetY} + '%'"></div>
                </div>
                <div class="map-attribution">&#169; OpenStreetMap contributors</div>
            </div>
        </div>

    </div>

</body>
</html>
