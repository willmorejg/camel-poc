- onException:
    exception:
      - com.fasterxml.jackson.databind.exc.MismatchedInputException
    handled:
      constant: true
    steps:
      - log:
          loggingLevel: ERROR
          message: >-
            Invalid JSON structure in ${header.CamelFileName} - expected an
            array of AddressRecord objects. Deleting. Error:
            ${exception.message}\n${exception.stacktrace}
      - to:
          uri: "bean:fileCleanupBean?method=deleteIfExists"

- route:
    id: json-to-geocode-to-pdf
    from:
      uri: "file:{{camel.variables.jsonToProcessPath}}"
      parameters:
        delete: true
        readLock: changed
        readLockCheckInterval: 500
        readLockTimeout: 10000
        include: ".*\\.json"
        recursive: false
      steps:
        - log:
            message: "Processing JSON file: ${header.CamelFileName}"
        - setProperty:
            name: baseFileName
            expression:
              simple: "${file:name.noext}"
        - setProperty:
            name: nowTimestamp
            expression:
              simple: "${date:now:yyyyMMdd-HHmmss-SSSSS}"
        - doTry:
            steps:
              - unmarshal:
                  json:
                    library: Jackson
                    useList: true
              - process:
                  ref: geocodeAddressRecordListProcessor
              - to: "thymeleaf:templates/record-geo.html"
              - setHeader:
                  name: CamelFileName
                  expression:
                    simple: "${exchangeProperty.baseFileName}-${exchangeProperty.nowTimestamp}.html"
              - to:
                  uri: "file:{{camel.variables.jsonToHtmlPath}}"
                  parameters:
                    fileExist: Override
              - log:
                  message: "HTML written: ${header.CamelFileName}"
              - process:
                  ref: htmlToPdfProcessor
              - setHeader:
                  name: CamelFileName
                  expression:
                    simple: "${exchangeProperty.baseFileName}-${exchangeProperty.nowTimestamp}.pdf"
              - to:
                  uri: "file:{{camel.variables.pdfOutputPath}}"
                  parameters:
                    fileExist: Override
              - log:
                  message: "PDF written: ${header.CamelFileName}"
            doCatch:
              - exception:
                  - java.lang.Exception
                steps:
                  - to:
                      uri: "bean:fileCleanupBean?method=moveToError"
                  - log:
                      loggingLevel: ERROR
                      message: "Error processing ${header.CamelFileName}: ${exception.message}\n${exception.stacktrace}"
