- route:
    id: csv-to-json
    from:
      uri: 'file:{{camel.variables.jsonInputPath}}'
      parameters:
        delete: true
        readLock: changed
        readLockCheckInterval: 500
        readLockTimeout: 10000
        include: .*\.csv
        recursive: false
      steps:
        - log:
            message: 'Processing CSV file: ${header.CamelFileName}'
        - setProperty:
            name: baseFileName
            expression:
              simple: '${file:name.noext}'
        - doTry:
            steps:
              - unmarshal:
                  csv:
                    useMaps: true
                    ignoreEmptyLines: true
              - marshal:
                  json: {}
              - to:
                  uri: >-
                    file:{{camel.variables.jsonToProcessPath}}?delete=false&fileName=${header.baseFileName}-csv.json
              - to:
                  uri: 'bean:fileCleanupBean?method=deleteIfExists'
              - log:
                  message: 'Successfully processed ${header.CamelFileName} to JSON'
            doCatch:
              - exception:
                  - java.lang.Exception
                steps:
                  - to:
                      uri: 'bean:fileCleanupBean?method=moveToError'
                  - log:
                      loggingLevel: ERROR
                      message: >-
                        Error processing ${header.CamelFileName}:
                        ${exception.message}\n${exception.stacktrace}
