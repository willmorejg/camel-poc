- route:
    id: json-to-geojson
    auto-startup: false
    from:
      uri: "file:{{camel.variables.geoJsonInputPath}}"
      parameters:
        delete: true
        moveFailed: "{{camel.variables.geoJsonErrorPath}}"
        readLock: changed
        readLockCheckInterval: 500
        readLockTimeout: 10000
        include: ".*\\.json"
        recursive: false
      steps:
        - log:
            message: "Geocoding addresses from: ${header.CamelFileName}"
        - setProperty:
            name: baseFileName
            expression:
              simple: "${file:name.noext}"
        - setProperty:
            name: nowTimestamp
            expression:
              simple: "${date:now:yyyyMMdd-HHmmss-SSSSS}"
        - doTry:
            steps:
              - unmarshal:
                  json:
                    library: Jackson
                    useList: true
              - process:
                  ref: addressRecordListProcessor
              - process:
                  ref: nominatimGeocoderProcessor
              - marshal:
                  json: {}
              - setHeader:
                  name: CamelFileName
                  expression:
                    simple: "${exchangeProperty.baseFileName}.geojson"
              - to:
                  uri: "file:{{camel.variables.geoJsonOutputPath}}"
                  parameters:
                    fileExist: Override
              - log:
                  message: "GeoJSON written: ${header.CamelFileName}"
            doCatch:
              - exception:
                  - java.lang.Exception
                steps:
                  - log:
                      loggingLevel: ERROR
                      message: "Error geocoding ${header.CamelFileName}: ${exception.message}\n${exception.stacktrace}"
